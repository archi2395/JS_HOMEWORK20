<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style20.css">

    <title>ToDoList</title>
</head>
<body> 
    <div class="todo-wrapper">
    <h1>ToDoList</h1>

    <form class="todo-form">
      <input type="text" class="todo-input">
      <button type="submit" class="add-btn">Додати</button>
    </form>

    <div class="todo-list">
      <div class="todo-item">
        <div class="todo-left">
          <input type="checkbox" class="todo-check">
          <span class="todo-text">Text</span>
        </div>
        <button class="delete-btn">Видалити</button>
      </div>

      <div class="todo-item">
        <div class="todo-left">
          <input type="checkbox" class="todo-check" checked>
          <span class="todo-text done">Text</span>
        </div>
        <button class="delete-btn">Видалити</button>
      </div>
    </div>
  </div>

  <div class="modal fade" id="taskModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">Текст завдання</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <p id="modalTaskText"></p>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
            Закрити
          </button>
        </div>

      </div>
    </div>
  </div>

   <script src="node_modules/jquery/dist/jquery.js"></script>
   <script src="node_modules/bootstrap/dist/js/bootstrap.min.js" ></script>
   <script src="script20.js"></script>
</body>
</html>
